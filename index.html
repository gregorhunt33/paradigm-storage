<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paradigm Storage Booking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .header-sub { font-size: 12px; color: #888; margin-top: 1px; }
    .header-date { font-size: 12px; color: #888; }

    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      color: #888;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      min-width: 90px;
    }

    .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
    .tab i { display: block; font-size: 18px; margin-bottom: 2px; }

    .content { padding: 1rem; max-width: 600px; margin: 0 auto; }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus { outline: none; border-color: #1a1a1a; }

    .btn {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.75rem;
      letter-spacing: 0.01em;
    }

    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .avail-banner {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
      line-height: 1.5;
    }

    .avail-banner.ok { background: #eaf3de; color: #2d5a0e; }
    .avail-banner.taken { background: #fdecea; color: #8b2020; }

    .unit-detail-box {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
      color: #444;
      line-height: 1.7;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }

    .metric {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .metric .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric .value { font-size: 28px; font-weight: 700; }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 0.75rem;
      font-size: 12px;
      color: #666;
      flex-wrap: wrap;
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 1rem;
    }

    .unit-cell {
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      user-select: none;
    }

    .unit-cell.empty { background: #f5f5f5; color: #999; }
    .unit-cell.occupied { background: #fdecea; color: #8b2020; border-color: #f5a5a5; }
    .unit-cell.booked { background: #fff8e6; color: #7a4f00; border-color: #f5d070; }
.unit-cell.blocked { background: #ece9f5; color: #3d2a8a; border-color: #b8aee8; }
    .unit-label { font-size: 9px; display: block; margin-top: 2px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .unit-info-card {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 13px;
      color: #444;
      line-height: 1.7;
      display: none;
    }

    .section-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .log-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .log-row:last-child { border-bottom: none; }

    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .badge.checkin { background: #eaf3de; color: #2d5a0e; }
    .badge.checkout { background: #fdecea; color: #8b2020; }
    .badge.booking { background: #fff8e6; color: #7a4f00; }

    .log-detail { flex: 1; line-height: 1.5; }
    .log-detail strong { color: #1a1a1a; }
    .log-meta { font-size: 11px; color: #999; }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 14px; }

    .export-btn {
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: none;
      color: #666;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .toast.success { background: #2d5a0e; color: #fff; }
    .toast.error { background: #8b2020; color: #fff; }

    canvas { max-width: 100%; }

    @media (min-width: 480px) {
      .metric-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Paradigm Storage</div>
    <div class="header-sub">Paradigm Reinstatements</div>
  </div>
  <div class="header-date" id="live-date"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('book')">
    <i class="ti ti-calendar"></i> Book
  </button>
  <button class="tab" onclick="switchTab('dashboard')">
    <i class="ti ti-layout-grid"></i> Dashboard
  </button>
  <button class="tab" onclick="switchTab('log')">
    <i class="ti ti-list"></i> Log
  </button>
</div>

<div class="content">

  <!-- BOOK TAB -->
  <div id="tab-book">
    <div class="card">
      <div class="field">
        <label>Your name</label>
        <input type="text" id="staff" placeholder="Type your name..." />
      </div>
      <div class="field">
        <label>Action</label>
        <select id="action" onchange="onActionChange()">
          <option value="">Select action...</option>
          <option value="booking">Advance booking</option>
          <option value="checkin">Check in</option>
          <option value="checkout">Check out</option>
        </select>
      </div>
      <div class="field">
        <label>Storage unit</label>
        <select id="unit" onchange="checkAvailability()">
          <option value="">Select unit...</option>
        </select>
      </div>

      <div class="avail-banner" id="avail-banner"></div>
      <div class="unit-detail-box" id="unit-detail"></div>

      <div id="booking-fields">
        <div class="field">
          <label>Customer name</label>
          <input type="text" id="customer" placeholder="e.g. Smith" />
        </div>
        <div class="field">
          <label>Start date</label>
          <input type="date" id="start-date" onchange="checkAvailability()" />
        </div>
        <div class="field" id="end-field">
          <label>Estimated end date</label>
          <input type="date" id="end-date" />
        </div>
        <div class="field">
          <label>Description of contents <span style="color:#aaa;font-weight:400;">(optional)</span></label>
          <input type="text" id="contents" placeholder="e.g. Living room furniture" />
        </div>
        <div class="field">
          <label>Photo of contents <span style="color:#aaa;font-weight:400;">(optional)</span></label>
          <input type="file" id="photo" accept="image/*" capture="environment" onchange="previewPhoto()" style="width:100%; padding:8px 0; font-size:14px;" />
          <div id="photo-preview" style="display:none; margin-top:8px;">
            <img id="photo-img" style="width:100%; border-radius:8px; border:1px solid #ddd; max-height:200px; object-fit:cover;" />
          </div>
        </div>
      </div>
      <button class="btn" id="submit-btn" onclick="submitForm()">Submit</button>
    </div>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="tab-dashboard" style="display:none;">
    <div class="metric-grid">
      <div class="metric">
        <div class="label">Occupied</div>
        <div class="value" id="m-occupied" style="color:#8b2020;">0</div>
      </div>
      <div class="metric">
        <div class="label">Booked ahead</div>
        <div class="value" id="m-booked" style="color:#7a4f00;">0</div>
      </div>
      <div class="metric">
        <div class="label">Available</div>
        <div class="value" id="m-free" style="color:#2d5a0e;">20</div>
      </div>
      <div class="metric">
        <div class="label">Utilisation</div>
        <div class="value" id="m-util">0%</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f5a5a5;"></div> Occupied</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5d070;"></div> Advance booking</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b8aee8;"></div> Block booked</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e0e0e0;"></div> Empty</div>
    </div>

    <div style="margin-bottom:1rem; position:relative;">
      <input type="text" id="customer-search" placeholder="Search customer name..." oninput="searchCustomer()" style="width:100%; padding:10px 12px 10px 36px; border:1px solid #ddd; border-radius:8px; font-size:15px;" />
      <i class="ti ti-search" style="position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#aaa; font-size:16px;"></i>
    </div>
    <div id="search-result" style="display:none; background:#f9f9f9; border-radius:10px; padding:1rem; margin-bottom:1rem; font-size:13px; color:#444; line-height:1.7;"></div>
    <div id="alerts-container" style="margin-bottom:1rem; display:none;"></div>
    <div style="font-size:12px; color:#aaa; margin-bottom:0.5rem;">Tap a unit to see details</div>
    <div class="unit-grid" id="unit-grid"></div>
    <div class="unit-info-card" id="unit-info-card"></div>

    <div class="card">
      <div class="section-title">Monthly check-ins</div>
      <canvas id="monthly-chart"></canvas>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div class="section-title" style="margin:0;">Activity log</div>
        <button class="export-btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      </div>
      <div id="log-list"><div class="empty-state">No activity yet.</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const UNITS = 36;
let state = { units: {}, log: [] };
try { const s = localStorage.getItem('paradigm_storage_v4'); if (s) state = JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('paradigm_storage_v4', JSON.stringify(state)); } catch(e) {} }

function previewPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('photo-img').src = e.target.result;
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function init() {
  const unitSel = document.getElementById('unit');
  for (let i = 1; i <= UNITS; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = 'Unit ' + i;
    unitSel.appendChild(o);
  }
  const sofaOpt = document.createElement('option');
  sofaOpt.value = 'sofa-rack'; sofaOpt.textContent = 'Sofa Rack';
  unitSel.appendChild(sofaOpt);
  document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('live-date').textContent = new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
  renderGrid(); renderLog(); renderMetrics(); checkAlerts();
}

function switchTab(tab) {
  ['book','dashboard','log'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['book','dashboard','log'][i] === tab);
  });
  if (tab === 'dashboard') { renderGrid(); renderMetrics(); renderChart(); checkAlerts(); }
  if (tab === 'log') renderLog();
}

function onActionChange() {
  const action = document.getElementById('action').value;
  document.getElementById('end-field').style.display = action === 'checkout' || action === 'cancel' || action === 'blocked' ? 'none' : '';
  document.getElementById('booking-fields').style.display = action === 'checkout' || action === 'cancel' ? 'none' : '';
  checkAvailability();
}

function datesOverlap(existingEnd, newStart) {
  if (!existingEnd || !newStart) return true;
  return new Date(newStart) <= new Date(existingEnd);
}

function checkAvailability() {
  const unit = document.getElementById('unit').value;
  const action = document.getElementById('action').value;
  const newStart = document.getElementById('start-date').value;
  const banner = document.getElementById('avail-banner');
  const detail = document.getElementById('unit-detail');
  const btn = document.getElementById('submit-btn');

  if (!unit || !action) { banner.style.display = 'none'; detail.style.display = 'none'; btn.disabled = false; return; }

  const u = state.units[unit];

  if (action === 'checkout') {
    if (!u) {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; Unit ' + unit + ' is already empty — nothing to check out.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = true;
    } else if (u.status === 'booking') {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; Unit ' + unit + ' has an advance booking, not a check in. Use Cancel Booking instead.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = true;
    } else {
      banner.className = 'avail-banner ok';
      banner.innerHTML = '&#10003; Unit ' + unit + ' is in use by <strong>' + u.customer + '</strong> — ready to check out.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = false;
    }
    return;
  }

  if (action === 'cancel') {
    if (!u) {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; Unit ' + unit + ' has no booking to cancel.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = true;
    } else if (u.status === 'checkin') {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; Unit ' + unit + ' is already checked in — use Check Out instead.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = true;
    } else {
      banner.className = 'avail-banner ok';
      banner.innerHTML = '&#10003; Advance booking for <strong>' + u.customer + '</strong> on Unit ' + unit + ' will be cancelled.';
      banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = false;
    }
    return;
  }

  if (u) {
    if (u.status === 'blocked') {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; <strong>Unit ' + unit + ' is block booked</strong> — held indefinitely by ' + u.customer + '.';
      banner.style.display = 'block';
      detail.innerHTML = '<strong>Customer:</strong> ' + u.customer + '<br><strong>Staff:</strong> ' + u.staff + (u.contents ? '<br><strong>Contents:</strong> ' + u.contents : '');
      detail.style.display = 'block';
      btn.disabled = true;
    } else if (u.status === 'checkin') {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; <strong>Unit ' + unit + ' is currently checked in</strong> — occupied by ' + u.customer + '. Must be checked out first.';
      banner.style.display = 'block';
      detail.innerHTML = '<strong>Customer:</strong> ' + u.customer + '<br><strong>Staff:</strong> ' + u.staff + '<br><strong>From:</strong> ' + (u.startDate || '—') + (u.contents ? '<br><strong>Contents:</strong> ' + u.contents : '');
      detail.style.display = 'block';
      btn.disabled = true;
    } else if (u.status === 'booking') {
      const overlaps = datesOverlap(u.endDate, newStart);
      if (overlaps) {
        banner.className = 'avail-banner taken';
        banner.innerHTML = '&#9888; <strong>Unit ' + unit + ' is already booked</strong> for ' + u.customer + ' until ' + (u.endDate || 'unknown') + '. Your start date overlaps.';
        banner.style.display = 'block';
        detail.innerHTML = '<strong>Customer:</strong> ' + u.customer + '<br><strong>From:</strong> ' + (u.startDate || '—') + '<br><strong>Est. end:</strong> ' + (u.endDate || '—') + (u.contents ? '<br><strong>Contents:</strong> ' + u.contents : '');
        detail.style.display = 'block';
        btn.disabled = true;
      } else {
        banner.className = 'avail-banner ok';
        banner.innerHTML = '&#10003; Unit ' + unit + ' has an existing booking until ' + u.endDate + ' but your start date is after that — available to book.';
        banner.style.display = 'block';
        detail.style.display = 'none';
        btn.disabled = false;
      }
    }
  } else {
    banner.className = 'avail-banner ok';
    banner.innerHTML = '&#10003; Unit ' + unit + ' is available.';
    banner.style.display = 'block'; detail.style.display = 'none'; btn.disabled = false;
  }
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type || 'success'); t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

function submitForm() {
  const staff = document.getElementById('staff').value.trim();
  const unit = document.getElementById('unit').value;
  const action = document.getElementById('action').value;
  const customer = document.getElementById('customer').value.trim();
  const startDate = document.getElementById('start-date').value;
  const endDate = document.getElementById('end-date').value;
  const contents = document.getElementById('contents').value.trim();

  if (!staff || !unit || !action) { toast('Please fill in all required fields.', 'error'); return; }
  if (action !== 'checkout' && !customer) { toast('Please enter the customer name.', 'error'); return; }

  const u = state.units[unit];
  if ((action === 'checkin' || action === 'booking') && u) {
    if (u.status === 'blocked') {
      banner.className = 'avail-banner taken';
      banner.innerHTML = '&#9888; <strong>Unit ' + unit + ' is block booked</strong> — held indefinitely by ' + u.customer + '.';
      banner.style.display = 'block';
      detail.innerHTML = '<strong>Customer:</strong> ' + u.customer + '<br><strong>Staff:</strong> ' + u.staff + (u.contents ? '<br><strong>Contents:</strong> ' + u.contents : '');
      detail.style.display = 'block';
      btn.disabled = true;
    } else if (u.status === 'checkin') { toast('Unit ' + unit + ' is checked in — must be checked out first.', 'error'); return; }
    if (u.status === 'booking' && datesOverlap(u.endDate, startDate)) { toast('Unit ' + unit + ' booking overlaps — choose another unit or later start date.', 'error'); return; }
  }
  if (action === 'checkout' && !u) { toast('Unit ' + unit + ' is already empty.', 'error'); return; }
  if (action === 'cancel' && (!u || u.status !== 'booking')) { toast('No advance booking to cancel on Unit ' + unit + '.', 'error'); return; }

  const resolvedCustomer = (action === 'checkout' || action === 'cancel') && u ? u.customer : customer;
  const photoFile = document.getElementById('photo') ? document.getElementById('photo').files[0] : null;
  let photoData = '';
  const saveEntry = (photo) => {
    const entry = { staff, unit: parseInt(unit), action, customer: resolvedCustomer, startDate, endDate, contents, photo: photo || '', timestamp: new Date().toISOString() };
    state.log.unshift(entry);
    if (action === 'checkin' || action === 'booking' || action === 'blocked') {
      state.units[unit] = { status: action, customer, staff, startDate: action === 'blocked' ? new Date().toISOString().split('T')[0] : startDate, endDate: action === 'blocked' ? 'Indefinite' : endDate, contents, photo: photo || '' };
    } else if (action === 'checkout' || action === 'cancel') {
      delete state.units[unit];
    }
    save();
    const msg = action === 'checkout' ? 'Unit ' + unit + ' checked out.' : action === 'cancel' ? 'Booking for ' + resolvedCustomer + ' on Unit ' + unit + ' cancelled.' : 'Unit ' + unit + ' booked for ' + customer + '.';
    toast(msg, 'success');
    document.getElementById('customer').value = '';
    document.getElementById('contents').value = '';
    document.getElementById('action').value = '';
    document.getElementById('unit').value = '';
    if (document.getElementById('photo')) { document.getElementById('photo').value = ''; document.getElementById('photo-preview').style.display = 'none'; }
    document.getElementById('avail-banner').style.display = 'none';
    document.getElementById('unit-detail').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    renderGrid(); renderMetrics();
  };
  if (photoFile) {
    const reader = new FileReader();
    reader.onload = (e) => saveEntry(e.target.result);
    reader.readAsDataURL(photoFile);
    return;
  }
  saveEntry('');
  return;
  const entry = { staff, unit: parseInt(unit), action, customer: resolvedCustomer, startDate, endDate, contents, timestamp: new Date().toISOString() };
}

function checkAlerts() {
  const container = document.getElementById('alerts-container');
  if (!container) return;
  const today = new Date();
  today.setHours(0,0,0,0);
  const alerts = [];

  const allUnits = [];
  for (let i = 1; i <= UNITS; i++) allUnits.push(i);
  allUnits.push('sofa-rack');
  for (const i of allUnits) {
    const u = state.units[i];
    if (!u || !u.endDate || u.endDate === 'Indefinite') continue;
    const end = new Date(u.endDate);
    end.setHours(0,0,0,0);
    const daysLeft = Math.round((end - today) / (1000 * 60 * 60 * 24));

    if (daysLeft < 0) {
      alerts.push({ unit: i, customer: u.customer, endDate: u.endDate, daysLeft, type: 'overdue' });
    } else if (daysLeft <= 7) {
      alerts.push({ unit: i, customer: u.customer, endDate: u.endDate, daysLeft, type: 'warning' });
    }
  }

  if (alerts.length === 0) {
    container.style.display = 'none';
    return;
  }

  alerts.sort((a, b) => a.daysLeft - b.daysLeft);

  container.innerHTML = alerts.map(a => {
    const isOverdue = a.type === 'overdue';
    const bg = isOverdue ? '#fdecea' : '#fff8e6';
    const col = isOverdue ? '#8b2020' : '#7a4f00';
    const icon = isOverdue ? '&#9888;' : '&#9201;';
    const msg = isOverdue
      ? 'Unit ' + a.unit + ' — <strong>' + a.customer + '</strong> is <strong>' + Math.abs(a.daysLeft) + ' day' + (Math.abs(a.daysLeft) !== 1 ? 's' : '') + ' overdue</strong> (est. end: ' + a.endDate + ')'
      : 'Unit ' + a.unit + ' — <strong>' + a.customer + '</strong> ends in <strong>' + a.daysLeft + ' day' + (a.daysLeft !== 1 ? 's' : '') + '</strong> (' + a.endDate + ')';
    return '<div style="background:' + bg + '; color:' + col + '; border-radius:8px; padding:10px 14px; margin-bottom:6px; font-size:13px; line-height:1.6; display:flex; align-items:flex-start; gap:8px;"><span style="font-size:15px;">' + icon + '</span><span>' + msg + '</span></div>';
  }).join('');

  container.style.display = 'block';
}

function searchCustomer() {
  const query = document.getElementById('customer-search').value.trim().toLowerCase();
  const result = document.getElementById('search-result');
  if (!query) { result.style.display = 'none'; renderGrid(); return; }

  const matches = [];
  for (let i = 1; i <= UNITS; i++) {
    const u = state.units[i];
    if (u && u.customer.toLowerCase().includes(query)) {
      matches.push({ unit: i, ...u });
    }
  }
  const sr = state.units['sofa-rack'];
  if (sr && sr.customer.toLowerCase().includes(query)) {
    matches.push({ unit: 'sofa-rack', ...sr });
  }

  if (matches.length === 0) {
    result.innerHTML = '<span style="color:#aaa;">No customer found matching “' + query + '”</span>';
    result.style.display = 'block';
  } else {
    result.innerHTML = matches.map(m => {
      const s = m.status === 'booking' ? 'Advance booking' : 'Checked in';
      const colour = m.status === 'booking' ? '#7a4f00' : '#8b2020';
      return '<div style="margin-bottom:' + (matches.length > 1 ? '12px; padding-bottom:12px; border-bottom:1px solid #eee;' : '0;') + '">' +
        '<strong style="color:' + colour + ';">Unit ' + m.unit + ' — ' + s + '</strong><br>' +
        'Customer: ' + m.customer + '<br>' +
        'Staff: ' + m.staff +
        (m.startDate ? '<br>From: ' + m.startDate : '') +
        (m.endDate ? '<br>Est. end: ' + m.endDate : '') +
        (m.contents ? '<br>Contents: ' + m.contents : '') +
        '</div>';
    }).join('');
    result.style.display = 'block';
  }

  // Highlight matching units on the grid
  renderGrid(matches.map(m => m.unit));
}

function renderGrid(highlight) {
  const grid = document.getElementById('unit-grid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 1; i <= UNITS; i++) {
    const u = state.units[i];
    const div = document.createElement('div');
    div.className = 'unit-cell ' + (u ? (u.status === 'booking' ? 'booked' : 'occupied') : 'empty');
    if (highlight && highlight.length > 0) {
      div.style.opacity = highlight.includes(i) ? '1' : '0.25';
      if (highlight.includes(i)) div.style.outline = '2px solid #1a1a1a';
    }
    div.innerHTML = '<div>Unit ' + i + '</div><span class="unit-label">' + (u ? u.customer : 'empty') + '</span>';
    div.onclick = () => showUnitInfo(i);
    grid.appendChild(div);
  }
}

function showUnitInfo(i) {
  const u = state.units[i];
  const card = document.getElementById('unit-info-card');
  if (!u) {
    card.innerHTML = '<strong>Unit ' + i + '</strong> — <span style="color:#aaa;">Empty and available</span>';
  } else {
    const s = u.status === 'booking' ? 'Advance booking' : u.status === 'blocked' ? 'Block booked (indefinite)' : 'Checked in';
    const photoHtml = u.photo ? '<img src="' + u.photo + '" style="width:100%; border-radius:8px; margin-top:10px; max-height:180px; object-fit:cover;" />' : '';
    const actionBtn = u.status === 'booking'
      ? '<button onclick="cancelFromDashboard('' + i + '')" style="margin-top:10px; width:100%; padding:10px; background:#8b2020; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Cancel booking</button>'
      : u.status === 'blocked'
      ? '<button onclick="cancelFromDashboard('' + i + '')" style="margin-top:10px; width:100%; padding:10px; background:#3d2a8a; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Remove block booking</button>'
      : '<button onclick="checkoutFromDashboard('' + i + '')" style="margin-top:10px; width:100%; padding:10px; background:#1a1a1a; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Check out</button>';
    const extendHtml = u.status === 'blocked' ? '' : '<div style="margin-top:10px; display:flex; gap:8px; align-items:center;">' +
      '<input type="date" id="extend-date-' + i + '" style="flex:1; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:14px;" value="' + (u.endDate || '') + '" />' +
      '<button onclick="extendBooking(\''+i+'\')" style="padding:8px 14px; background:#2d5a0e; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;">Extend date</button>' +
      '</div>';
    card.innerHTML = '<strong>Unit ' + i + ' — ' + s + '</strong><br>Customer: ' + u.customer + '<br>Staff: ' + u.staff + (u.startDate ? '<br>From: ' + u.startDate : '') + (u.endDate ? '<br>Est. end: ' + u.endDate : '') + (u.contents ? '<br>Contents: ' + u.contents : '') + photoHtml + extendHtml + actionBtn;
  }
  card.style.display = 'block';
}

function extendBooking(i) {
  const u = state.units[i];
  if (!u) return;
  const newDate = document.getElementById('extend-date-' + i).value;
  if (!newDate) { toast('Please select a new end date.', 'error'); return; }
  if (newDate <= (u.endDate || '')) { toast('New date must be after the current end date.', 'error'); return; }
  const oldDate = u.endDate || 'none';
  state.units[i].endDate = newDate;
  const entry = { staff: u.staff, unit: i, action: 'extend', customer: u.customer, startDate: u.startDate, endDate: newDate, contents: u.contents, timestamp: new Date().toISOString() };
  state.log.unshift(entry);
  save();
  toast('Unit ' + i + ' extended to ' + newDate + '.', 'success');
  showUnitInfo(i);
}

function cancelFromDashboard(i) {
  const u = state.units[i];
  if (!u || u.status !== 'booking') { return; }
  if (!confirm('Cancel booking for ' + u.customer + ' on Unit ' + i + '?')) return;
  const entry = { staff: u.staff, unit: i, action: 'cancel', customer: u.customer, startDate: u.startDate, endDate: u.endDate, contents: u.contents, timestamp: new Date().toISOString() };
  state.log.unshift(entry);
  delete state.units[i];
  save();
  document.getElementById('unit-info-card').style.display = 'none';
  renderGrid(); renderMetrics();
  toast('Booking for ' + entry.customer + ' on Unit ' + i + ' cancelled.', 'success');
}

function checkoutFromDashboard(i) {
  const u = state.units[i];
  if (!u || u.status !== 'checkin') { return; }
  if (!confirm('Check out ' + u.customer + ' from Unit ' + i + '?')) return;
  const entry = { staff: u.staff, unit: i, action: 'checkout', customer: u.customer, startDate: u.startDate, endDate: u.endDate, contents: u.contents, timestamp: new Date().toISOString() };
  state.log.unshift(entry);
  delete state.units[i];
  save();
  document.getElementById('unit-info-card').style.display = 'none';
  renderGrid(); renderMetrics();
  toast('Unit ' + i + ' checked out.', 'success');
}

function renderMetrics() {
  let occupied = 0, booked = 0;
  Object.values(state.units).forEach(u => { if (u.status === 'checkin') occupied++; else if (u.status === 'booking') booked++; });
  const free = UNITS - occupied - booked;
  document.getElementById('m-occupied').textContent = occupied;
  document.getElementById('m-booked').textContent = booked;
  document.getElementById('m-free').textContent = free;
  document.getElementById('m-util').textContent = Math.round((occupied / UNITS) * 100) + '%';
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (!state.log.length) { list.innerHTML = '<div class="empty-state">No activity yet.</div>'; return; }
  list.innerHTML = state.log.slice(0, 50).map(e => {
    const d = new Date(e.timestamp).toLocaleDateString('en-GB', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
    const bc = e.action === 'checkin' ? 'checkin' : e.action === 'checkout' ? 'checkout' : e.action === 'cancel' ? 'checkout' : e.action === 'extend' ? 'checkin' : e.action === 'blocked' ? 'booking' : 'booking';
    const bl = e.action === 'checkin' ? 'Check in' : e.action === 'checkout' ? 'Check out' : e.action === 'cancel' ? 'Cancelled' : e.action === 'extend' ? 'Extended' : e.action === 'blocked' ? 'Block booked' : 'Booking';
    return '<div class="log-row"><span class="badge ' + bc + '">' + bl + '</span><div class="log-detail"><strong>Unit ' + e.unit + '</strong> — ' + e.customer + (e.contents ? ' (' + e.contents + ')' : '') + '<div class="log-meta">' + e.staff + ' &middot; ' + d + '</div></div></div>';
  }).join('');
}

function exportCSV() {
  const headers = ['Date','Time','Staff','Unit','Action','Customer','Start Date','End Date','Contents'];
  const rows = state.log.map(e => {
    const al = e.action === 'checkin' ? 'Check In' : e.action === 'checkout' ? 'Check Out' : 'Advance Booking';
    return [new Date(e.timestamp).toLocaleDateString('en-GB'), new Date(e.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}), e.staff,'Unit '+e.unit,al,e.customer,e.startDate,e.endDate||'',e.contents||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv = [headers.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'paradigm-storage-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('CSV downloaded.','success');
}

let chartInst = null;
function renderChart() {
  const months = [], counts = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.toLocaleDateString('en-GB',{month:'short'}));
    const mStr = d.toISOString().slice(0,7);
    counts.push(state.log.filter(e=>e.timestamp&&e.timestamp.startsWith(mStr)&&e.action==='checkin').length);
  }
  const canvas = document.getElementById('monthly-chart');
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(canvas, {
    type:'bar',
    data:{labels:months,datasets:[{label:'Check-ins',data:counts,backgroundColor:'#b5d4f4',borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}

init();
</script>
